<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Simplified Works</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --sidebar-width: 260px;
    }
    body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
    
    /* Authentication Overlay */
    .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .auth-box { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--card-border); text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .auth-box input { padding: 14px; width: 100%; margin: 15px 0; border-radius: 8px; border: 1px solid var(--card-border); background: rgba(0,0,0,0.2); color: #fff; font-size: 1rem; }
    .auth-box input:focus { outline: none; border-color: var(--teal); }

    /* Sidebar Layout */
    .sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 1px solid var(--card-border); padding: 30px 20px; display: flex; flex-direction: column; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; padding-left: 10px; }
    .sidebar-logo svg { color: var(--teal); }
    .sidebar-logo h2 { margin: 0; font-size: 1.2rem; color: #fff; }
    
    .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 12px; margin-bottom: 5px; transition: all 0.2s ease; font-weight: 500; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: rgba(26, 219, 178, 0.1); color: var(--teal); }
    .nav-item svg { width: 18px; height: 18px; }

    /* Main Content */
    .main-content { flex: 1; overflow-y: auto; padding: 40px; }
    .header { margin-bottom: 40px; }
    .header h1 { margin: 0 0 10px 0; font-size: 2rem; color: #fff; }
    .header p { margin: 0; color: var(--text-muted); }

    /* Overview Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid var(--card-border); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .stat-card h3 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    .stat-card .value { font-size: 2.5rem; font-weight: 700; color: #fff; margin: 0; }
    .stat-card.teal .value { color: var(--teal); }
    .stat-card.gold .value { color: var(--gold); }

    /* Table Styles */
    .table-container { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--card-border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 16px 20px; background: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 500; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--card-border); }
    td { padding: 16px 20px; border-bottom: 1px solid var(--card-border); color: #ccc; font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 15px; opacity: 0.5; }
    
    /* View Panes */
    .view-pane { display: none; }
    .view-pane.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- Authentication -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
      <h2 style="color: #fff; margin-top: 0;">Admin Portal</h2>
      <p style="color: var(--text-muted); margin-bottom: 30px;">Enter your master password</p>
      <input type="password" id="adminPwd" placeholder="Password" onkeydown="if(event.key === 'Enter') login()" />
      <button class="btn btn-primary" onclick="login()" style="width: 100%; margin-top: 10px;">Access Dashboard</button>
      <p id="authError" style="color: #ff4b4b; margin-top: 15px; display: none; font-size: 0.9rem;">Incorrect password</p>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <h2>Simplified Works</h2>
    </div>

    <div class="nav-item active" onclick="switchTab('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      Overview
    </div>
    <div class="nav-item" onclick="switchTab('contacts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      Contact Leads
    </div>
    <div class="nav-item" onclick="switchTab('quotes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      Quote Requests
    </div>
    <div class="nav-item" onclick="switchTab('feedback')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
      Client Feedback
    </div>
    <div class="nav-item" onclick="switchTab('subscribers')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      Subscribers
    </div>
  </div>

  <div class="main-content">
    
    <!-- Overview Tab -->
    <div id="overview" class="view-pane active">
      <div class="header">
        <h1>Dashboard Overview</h1>
        <p>A high-level view of your business growth.</p>
      </div>
      <div class="stats-grid" id="overviewStats">
        <div class="stat-card"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- Data Tabs -->
    <div id="dataView" class="view-pane">
      <div class="header">
        <h1 id="dataTitle">Data View</h1>
        <p id="dataSubtitle">Viewing records.</p>
      </div>
      <div class="table-container" id="tableContainer">
        <div class="loading">Select a category to load data...</div>
      </div>
    </div>

  </div>

  <script>
    let currentPwd = '';

    function login() {
      const pwd = document.getElementById('adminPwd').value;
      if (pwd === 'admin123') { 
        currentPwd = pwd;
        document.getElementById('authOverlay').style.display = 'none';
        loadOverview();
      } else {
        document.getElementById('authError').style.display = 'block';
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');

      if (tabId === 'overview') {
        document.getElementById('dataView').classList.remove('active');
        document.getElementById('overview').classList.add('active');
        loadOverview();
      } else {
        document.getElementById('overview').classList.remove('active');
        document.getElementById('dataView').classList.add('active');
        
        const titles = {
          'contacts': { t: 'Contact Leads', s: 'General inquiries from the contact form.' },
          'quotes': { t: 'Quote Requests', s: 'High-intent clients requesting a project quote.' },
          'feedback': { t: 'Client Feedback', s: 'Reviews and feedback from existing clients.' },
          'subscribers': { t: 'Newsletter Subscribers', s: 'Emails collected from the footer.' }
        };
        
        document.getElementById('dataTitle').textContent = titles[tabId].t;
        document.getElementById('dataSubtitle').textContent = titles[tabId].s;
        loadData(tabId);
      }
    }

    async function loadOverview() {
      const container = document.getElementById('overviewStats');
      try {
        const res = await fetch(`/api/get-data?type=overview`, { headers: { 'Authorization': currentPwd } });
        if (!res.ok) throw new Error('Failed to load overview');
        const data = await res.json();
        
        container.innerHTML = `
          <div class="stat-card teal">
            <h3>Total Contact Leads</h3>
            <p class="value">${data.overview.contacts}</p>
          </div>
          <div class="stat-card gold">
            <h3>Total Quote Requests</h3>
            <p class="value">${data.overview.quotes}</p>
          </div>
          <div class="stat-card">
            <h3>Client Feedback</h3>
            <p class="value">${data.overview.feedback}</p>
          </div>
          <div class="stat-card">
            <h3>Total Subscribers</h3>
            <p class="value">${data.overview.subscribers}</p>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<p style="color:red">Error loading stats.</p>`;
      }
    }

    async function loadData(type) {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div class="loading">Loading data securely...</div>';
      
      try {
        const res = await fetch(`/api/get-data?type=${type}`, {
          headers: { 'Authorization': currentPwd }
        });
        
        if (!res.ok) throw new Error('Unauthorized or failed to load');
        const data = await res.json();
        
        if (data.records.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
              <h3>No records found</h3>
              <p>When someone submits this form, it will appear here.</p>
            </div>
          `;
          return;
        }

        let html = '<table><thead><tr>';
        const keys = Object.keys(data.records[0]).filter(k => k.toLowerCase() !== 'id' && k.toLowerCase() !== 'leadtype');
        keys.forEach(k => html += `<th>${k}</th>`);
        html += '</tr></thead><tbody>';
        
        data.records.forEach(row => {
          html += '<tr>';
          keys.forEach(k => {
            let val = row[k] || '-';
            // Format dates slightly if it looks like a date string
            if (k.toLowerCase().includes('at') && val.includes('T')) {
              val = new Date(val).toLocaleDateString() + ' ' + new Date(val).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            html += `<td>${val}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="loading" style="color: red;">Error: ${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
