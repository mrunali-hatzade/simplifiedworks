<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Simplified Works</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
    .dashboard-container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    h1 { color: var(--gold); margin-bottom: 20px; font-size: 2rem; }
    .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .auth-box { background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--card-border); text-align: center; }
    .auth-box input { padding: 12px; width: 100%; margin: 10px 0; border-radius: 6px; border: 1px solid var(--card-border); background: var(--bg); color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--card-border); }
    th { color: var(--teal); font-weight: 600; }
    tr:hover { background: rgba(255,255,255,0.02); }
    .loading { text-align: center; color: var(--text-muted); padding: 20px; }
  </style>
</head>
<body>

  <!-- Authentication -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
      <h2 style="color: var(--gold); margin-bottom: 10px;">Admin Login</h2>
      <p style="color: var(--text-muted); margin-bottom: 20px;">Enter dashboard password</p>
      <input type="password" id="adminPwd" placeholder="Password" />
      <button class="btn btn-primary" onclick="login()" style="width: 100%;">Login</button>
      <p id="authError" style="color: red; margin-top: 10px; display: none;">Incorrect password</p>
    </div>
  </div>

  <div class="dashboard-container" style="display: none;" id="dashContent">
    <h1>Lead Dashboard</h1>
    
    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
      <button class="btn btn-primary" onclick="loadData('contacts')">Contact Form Leads</button>
      <button class="btn btn-outline" onclick="loadData('subscribers')">Newsletter Subscribers</button>
    </div>

    <div id="tableContainer">
      <div class="loading">Select a category to load data...</div>
    </div>
  </div>

  <script>
    let currentPwd = '';

    function login() {
      const pwd = document.getElementById('adminPwd').value;
      if (pwd === 'admin123') { // Simple frontend protection, API has the real protection
        currentPwd = pwd;
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('dashContent').style.display = 'block';
        loadData('contacts');
      } else {
        document.getElementById('authError').style.display = 'block';
      }
    }

    async function loadData(type) {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div class="loading">Loading data securely...</div>';
      
      try {
        const res = await fetch(`/api/get-data?type=${type}`, {
          headers: { 'Authorization': currentPwd }
        });
        
        if (!res.ok) throw new Error('Unauthorized or failed to load');
        const data = await res.json();
        
        if (data.records.length === 0) {
          container.innerHTML = '<div class="loading">No records found yet.</div>';
          return;
        }

        let html = '<table><thead><tr>';
        const keys = Object.keys(data.records[0]);
        keys.forEach(k => html += `<th>${k}</th>`);
        html += '</tr></thead><tbody>';
        
        data.records.forEach(row => {
          html += '<tr>';
          keys.forEach(k => {
            html += `<td>${row[k] || '-'}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="loading" style="color: red;">Error: ${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
